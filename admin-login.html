<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | My Restaurant</title>
    <link rel="stylesheet" href="style.css?v=20260424b">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-login-screen">
        <div class="admin-login-card">
            <h3>Admin Login</h3>
            <p class="order-note-help">Sign in to manage orders, menu, delivery fees, and public site details.</p>
            <label for="admin-username">Username</label>
            <input id="admin-username" type="text" autocomplete="username">
            <label for="admin-password">Password</label>
            <input id="admin-password" type="password" autocomplete="current-password">
            <p id="admin-login-status" class="payment-status"></p>
            <button id="admin-login-btn" type="button">Log In</button>
        </div>
    </div>

    <script src="admin-login.js"></script>
</body>
</html>
