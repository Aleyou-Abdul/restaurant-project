name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project files to server
        run: |
          rsync -az --delete \
            --exclude ".env" \
            --exclude "data/" \
            --exclude "images/uploads/" \
            --exclude "node_modules/" \
            --exclude ".git/" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_DIR }}/"

      - name: Install dependencies and restart app
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" <<'EOF'
          set -e
          cd "${{ secrets.APP_DIR }}"
          npm install --omit=dev
          npm run backup-db
          npm run check-db
          pm2 start ecosystem.config.js --only restaurant-project || pm2 reload ecosystem.config.js --only restaurant-project --update-env
          pm2 save
          EOF
