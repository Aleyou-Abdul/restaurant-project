<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Report | My Restaurant</title>
    <link rel="stylesheet" href="style.css?v=20260424b">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="owner-report-page">
        <div class="admin-main owner-report-main">
            <div class="admin-topbar">
                <div>
                    <h2>Owner Sales Report</h2>
                    <p id="owner-report-status" class="payment-status info">Loading report...</p>
                </div>
                <div class="admin-topbar-actions">
                    <select id="owner-range-filter" class="owner-range-filter">
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                        <option value="all">All Time</option>
                    </select>
                    <button id="owner-refresh-btn" type="button">Refresh</button>
                    <button id="owner-download-btn" type="button">Download PDF</button>
                    <button id="owner-print-btn" type="button">Print Report</button>
                    <button id="owner-logout-btn" type="button">Log Out</button>
                </div>
            </div>

            <div class="admin-stats-grid">
                <article class="admin-stat-card">
                    <p>Total Orders</p>
                    <h3 id="owner-total-orders">0</h3>
                </article>
                <article class="admin-stat-card">
                    <p>Total Items</p>
                    <h3 id="owner-total-quantity">0</h3>
                </article>
                <article class="admin-stat-card">
                    <p>Total Item Sales</p>
                    <h3 id="owner-total-sales">&#8358;0</h3>
                </article>
            </div>

            <section class="admin-surface">
                <div class="admin-surface-header">
                    <h3>Items Sold</h3>
                </div>
                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Quantity</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="owner-report-body"></tbody>
                    </table>
                </div>
                <div class="owner-report-total">
                    <strong>Total of all item sales</strong>
                    <span id="owner-report-total-value">&#8358;0</span>
                </div>
            </section>
        </div>
    </div>

    <script src="owner-report.js"></script>
</body>
</html>
