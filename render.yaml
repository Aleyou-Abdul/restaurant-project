services:
  - type: web
    name: restaurant-project
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: STORAGE_ROOT
        value: /tmp/restaurant-demo-storage
