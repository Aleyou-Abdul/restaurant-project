<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | My Restaurant</title>
    <link rel="stylesheet" href="style.css?v=20260522a">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body admin-auth-body">
    <main class="admin-auth-card">
        <p class="receipt-kicker">Staff Access</p>
        <h1>Order Management Login</h1>
        <p class="admin-helper-text">Use the staff account created by admin to manage orders and update stock quantity.</p>
        <label for="staff-login-username">Username</label>
        <input id="staff-login-username" type="text" autocomplete="username">
        <label for="staff-login-password">Password</label>
        <input id="staff-login-password" type="password" autocomplete="current-password">
        <button id="staff-login-btn" type="button">Log In</button>
        <p id="staff-login-status" class="payment-status info">Enter your staff login details.</p>
    </main>

    <script src="staff-login.js?v=20260522a"></script>
</body>
</html>
