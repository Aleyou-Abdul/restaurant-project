<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login | My Restaurant</title>
    <link rel="stylesheet" href="style.css?v=20260424b">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-login-screen">
        <div class="admin-login-card">
            <h3>Owner Access</h3>
            <p class="order-note-help">Enter the owner password to open the protected sales report.</p>
            <label for="owner-password">Password</label>
            <input id="owner-password" type="password" autocomplete="current-password">
            <p id="owner-login-status" class="payment-status"></p>
            <button id="owner-login-btn" type="button">Open Owner Report</button>
        </div>
    </div>

    <script src="owner-login.js"></script>
</body>
</html>
